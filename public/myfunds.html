<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Viresce | My Funds</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
  <meta name="theme-color" content="#0b0f19">
  <link rel="stylesheet" href="/style.css">
  <style>
    .funds-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .fund-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: box-shadow 0.2s, transform 0.2s;
      cursor: pointer;
    }

    .fund-card:hover {
      box-shadow: 0 12px 32px rgba(15,23,42,0.1);
      transform: translateY(-2px);
    }

    .fund-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .fund-card-title {
      font-family: "Syne", sans-serif;
      font-weight: 700;
      font-size: 1.05rem;
      margin: 0;
    }

    .fund-card-date {
      font-size: 0.75rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .fund-card-stocks {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .fund-stock-tag {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .fund-stock-weight {
      color: var(--muted);
      font-weight: 400;
    }

    .fund-card-actions {
      display: flex;
      gap: 8px;
      margin-top: auto;
      padding-top: 4px;
      border-top: 1px solid var(--border);
    }

    .fund-action-btn {
      flex: 1;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      font-size: 0.8rem;
      font-family: "DM Mono", monospace;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }

    .fund-action-btn:hover {
      background: var(--black);
      color: white;
      border-color: var(--black);
    }

    .fund-action-btn.danger:hover {
      background: #dc2626;
      border-color: #dc2626;
      color: white;
    }

    /* Save panel */
    .save-panel {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      margin-bottom: 32px;
      display: flex;
      gap: 12px;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .save-panel .form-group {
      flex: 1;
      min-width: 200px;
      margin: 0;
    }

    .save-panel label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .save-panel input {
      width: 100%;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg);
      font-size: 0.9rem;
      font-family: "DM Mono", monospace;
      color: var(--text);
      box-sizing: border-box;
    }

    .save-panel input:focus {
      outline: none;
      border-color: var(--accent, #4F46E5);
      box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
    }

    .save-btn {
      padding: 10px 20px;
      background: var(--black);
      color: white;
      border: none;
      border-radius: 10px;
      font-family: "DM Mono", monospace;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s;
    }

    .save-btn:hover { opacity: 0.85; }
    .save-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }

    .empty-state .empty-icon {
      font-size: 3rem;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    .empty-state h3 {
      font-family: "Syne", sans-serif;
      font-size: 1.2rem;
      margin: 0 0 8px;
      color: var(--text);
    }

    .empty-state p {
      font-size: 0.88rem;
      max-width: 320px;
      margin: 0 auto 20px;
    }

    .empty-state a {
      display: inline-block;
      padding: 10px 20px;
      background: var(--black);
      color: white;
      border-radius: 10px;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      transition: opacity 0.2s;
    }

    .empty-state a:hover { opacity: 0.8; }

    /* Auth notice */
    .auth-notice {
      background: #fffbeb;
      border: 1px solid #fde68a;
      color: #92400e;
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 0.88rem;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .auth-notice a {
      color: #92400e;
      font-weight: 700;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--black);
      color: white;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 0.85rem;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      z-index: 999;
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s ease;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    @media (max-width: 768px) {
      .funds-grid {
        grid-template-columns: 1fr;
      }
      .save-panel {
        flex-direction: column;
      }
      .save-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
<header>
  <div class="container header-flex">
    <h1 class="logo">VIRESCE</h1>
    <span class="tagline">Saved Portfolios</span>
  </div>
</header>
<nav>
  <div class="container">
    <ul class="nav-links">
      <li><a href="/index.html">Dashboard</a></li>
      <li><a href="/compare.html">Compare</a></li>
      <li><a href="/fund.html">My Fund</a></li>
      <li><a href="/myfunds.html" class="active">Saved Funds</a></li>
    </ul>
  </div>
</nav>

<main class="container">
  <section class="page-hero">
    <h2>Saved Funds</h2>
    <p>Your previously generated fund portfolios.</p>
  </section>

  <!-- Auth notice (shown if not logged in) -->
  <div class="auth-notice" id="authNotice" style="display:none;">
    ⚠️ <span>You need to <a href="/login.html">sign in</a> to save and view your funds. Funds shown below are from this session only.</span>
  </div>

  <!-- Save current fund panel -->
  <div class="save-panel" id="savePanel">
    <div class="form-group">
      <label>Fund Name</label>
      <input type="text" id="fundNameInput" placeholder="e.g. Tech Growth Portfolio" maxlength="60" />
    </div>
    <button class="save-btn" id="saveFundBtn">Save Current Fund</button>
  </div>

  <!-- Funds grid -->
  <div class="funds-grid" id="fundsGrid">
    <!-- Populated by JS -->
  </div>
</main>

<div class="toast" id="toast"></div>

<footer>
  <p>&copy; 2026 Viresce FinTech</p>
</footer>

<script>
  /* =========================
     In-memory fund store
     TODO: Replace with API calls when MongoDB is connected:
       GET  /api/portfolios       — load funds
       POST /api/portfolios       — save fund
       DELETE /api/portfolios/:id — delete fund
  ========================= */

  // Read funds from sessionStorage so they persist across page navigation
  // (but reset on browser close — fine for mock mode)
  let savedFunds = JSON.parse(sessionStorage.getItem("viresce_funds") || "[]");

  function persistFunds() {
    sessionStorage.setItem("viresce_funds", JSON.stringify(savedFunds));
  }

  /* =========================
     TOAST NOTIFICATION
  ========================= */
  function showToast(message, duration = 3000) {
    const toast = document.getElementById("toast");
    toast.textContent = message;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), duration);
  }

  /* =========================
     CHECK AUTH STATE
  ========================= */
  const token = localStorage.getItem("viresce_token");
  if (!token) {
    document.getElementById("authNotice").style.display = "flex";
  }

  /* =========================
     SAVE FUND
     Reads last generated fund from sessionStorage
     (fund.js writes it there after generating)
  ========================= */
  document.getElementById("saveFundBtn").addEventListener("click", () => {
    const name = document.getElementById("fundNameInput").value.trim();
    if (!name) {
      showToast("Please enter a fund name.");
      return;
    }

    // Get last generated fund from session
    const lastFund = JSON.parse(sessionStorage.getItem("viresce_last_fund") || "null");
    if (!lastFund || !lastFund.stocks?.length) {
      showToast("No fund to save. Go to My Fund and generate one first.");
      return;
    }

    const newFund = {
      _id: Date.now().toString(),
      name,
      stocks: lastFund.stocks,
      metrics: lastFund.metrics,
      createdAt: new Date().toISOString()
    };

    savedFunds.unshift(newFund);
    persistFunds();
    renderFunds();
    document.getElementById("fundNameInput").value = "";
    showToast(`✓ "${name}" saved!`);

    /* TODO: When MongoDB is connected, replace above with:
    Auth.fetchAuth("/api/portfolios", {
      method: "POST",
      body: JSON.stringify({ name, stocks: lastFund.stocks })
    }).then(r => r.json()).then(data => {
      savedFunds.unshift(data);
      renderFunds();
    });
    */
  });

  /* =========================
     RENDER FUNDS
  ========================= */
  function renderFunds() {
    const grid = document.getElementById("fundsGrid");

    if (!savedFunds.length) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1;">
          <div class="empty-icon">📂</div>
          <h3>No saved funds yet</h3>
          <p>Build a fund on the My Fund page, then come back here to save it.</p>
          <a href="/fund.html">Build a Fund →</a>
        </div>
      `;
      return;
    }

    grid.innerHTML = "";

    savedFunds.forEach(fund => {
      const card = document.createElement("div");
      card.className = "fund-card";

      const date = new Date(fund.createdAt).toLocaleDateString("en-MY", {
        day: "numeric", month: "short", year: "numeric"
      });

      const stockTags = fund.stocks.map(s => `
        <span class="fund-stock-tag">
          ${s.symbol}
          <span class="fund-stock-weight">${(s.weight * 100).toFixed(0)}%</span>
        </span>
      `).join("");

      const metricsHtml = fund.metrics ? `
        <div style="display:flex;gap:16px;font-size:0.8rem;">
          <span>Return: <strong style="color:${parseFloat(fund.metrics.totalReturn) >= 0 ? 'var(--positive)' : 'var(--negative)'}">${parseFloat(fund.metrics.totalReturn) >= 0 ? '+' : ''}${fund.metrics.totalReturn}%</strong></span>
          <span>Sharpe: <strong>${fund.metrics.sharpe}</strong></span>
          <span>Vol: <strong>${fund.metrics.volatility}%</strong></span>
        </div>
      ` : "";

      card.innerHTML = `
        <div class="fund-card-header">
          <h3 class="fund-card-title">${fund.name}</h3>
          <span class="fund-card-date">${date}</span>
        </div>
        <div class="fund-card-stocks">${stockTags}</div>
        ${metricsHtml}
        <div class="fund-card-actions">
          <button class="fund-action-btn" onclick="loadFund('${fund._id}')">
            Load in Fund Builder
          </button>
          <button class="fund-action-btn danger" onclick="deleteFund('${fund._id}')">
            Delete
          </button>
        </div>
      `;

      grid.appendChild(card);
    });
  }

  /* =========================
     LOAD FUND INTO BUILDER
  ========================= */
  function loadFund(id) {
    const fund = savedFunds.find(f => f._id === id);
    if (!fund) return;
    // Store it so fund.js can pick it up
    sessionStorage.setItem("viresce_load_fund", JSON.stringify(fund));
    window.location.href = "/fund.html";
  }

  /* =========================
     DELETE FUND
  ========================= */
  function deleteFund(id) {
    const fund = savedFunds.find(f => f._id === id);
    if (!fund) return;
    if (!confirm(`Delete "${fund.name}"?`)) return;

    savedFunds = savedFunds.filter(f => f._id !== id);
    persistFunds();
    renderFunds();
    showToast("Fund deleted.");

    /* TODO: When MongoDB is connected:
    Auth.fetchAuth(`/api/portfolios/${id}`, { method: "DELETE" });
    */
  }

  // Initial render
  renderFunds();
</script>
<script src="/auth-utils.js"></script>
</body>
</html>
