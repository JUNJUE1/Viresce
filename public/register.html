<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Viresce | Register</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/style.css">
  <style>
    .auth-wrapper {
      min-height: calc(100vh - 140px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .auth-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 40px;
      width: 100%;
      max-width: 420px;
    }
    .auth-card h2 { margin: 0 0 6px; font-size: 1.6rem; }
    .auth-card p.subtitle {
      color: var(--muted);
      margin: 0 0 28px;
      font-size: 0.95rem;
    }
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg);
      font-size: 0.95rem;
      color: var(--text);
      transition: border 0.2s, box-shadow 0.2s;
      box-sizing: border-box;
    }
    .form-group input:focus {
      outline: none;
      border-color: #4F46E5;
      box-shadow: 0 0 0 3px rgba(79,70,229,0.12);
    }
    .form-group .hint {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 4px;
    }
    .auth-btn {
      width: 100%;
      padding: 13px;
      background: #0b0f19;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }
    .auth-btn:hover { opacity: 0.85; }
    .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .auth-error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.9rem;
      margin-bottom: 16px;
      display: none;
    }
    .auth-success {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #16a34a;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.9rem;
      margin-bottom: 16px;
      display: none;
    }
    .auth-switch {
      text-align: center;
      margin-top: 22px;
      font-size: 0.9rem;
      color: var(--muted);
    }
    .auth-switch a {
      color: #4F46E5;
      font-weight: 600;
      text-decoration: none;
    }
    .auth-switch a:hover { text-decoration: underline; }
    .password-strength {
      height: 4px;
      border-radius: 2px;
      margin-top: 8px;
      background: var(--border);
      overflow: hidden;
    }
    .password-strength-bar {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s, background 0.3s;
      width: 0%;
    }
  </style>
</head>
<body>
<header>
  <div class="container header-flex">
    <h1 class="logo">VIRESCE</h1>
    <span class="tagline">Stock Comparison Engine</span>
  </div>
</header>
<nav>
  <div class="container">
    <ul class="nav-links">
      <li><a href="/index.html">Dashboard</a></li>
      <li><a href="/compare.html">Compare</a></li>
      <li><a href="/fund.html">My Fund</a></li>
    </ul>
  </div>
</nav>

<div class="auth-wrapper">
  <div class="auth-card">
    <h2>Create account</h2>
    <p class="subtitle">Start saving your portfolios and watchlists.</p>

    <div class="auth-error" id="authError"></div>
    <div class="auth-success" id="authSuccess"></div>

    <div class="form-group">
      <label>Username</label>
      <input type="text" id="usernameInput" placeholder="e.g. traderpro" autocomplete="username" />
      <div class="hint">3–30 characters</div>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="emailInput" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="new-password" />
      <div class="password-strength">
        <div class="password-strength-bar" id="strengthBar"></div>
      </div>
      <div class="hint" id="strengthLabel">At least 8 characters</div>
    </div>

    <button class="auth-btn" id="registerBtn">Create Account</button>

    <div class="auth-switch">
      Already have an account? <a href="/login.html">Sign in</a>
    </div>
  </div>
</div>

<footer>
  <p>&copy; 2026 Viresce FinTech</p>
</footer>

<script>
  if (localStorage.getItem("viresce_token")) {
    window.location.href = "/index.html";
  }

  const registerBtn = document.getElementById("registerBtn");
  const errorBox = document.getElementById("authError");
  const successBox = document.getElementById("authSuccess");
  const passwordInput = document.getElementById("passwordInput");
  const strengthBar = document.getElementById("strengthBar");
  const strengthLabel = document.getElementById("strengthLabel");

  // Password strength indicator
  passwordInput.addEventListener("input", () => {
    const val = passwordInput.value;
    let strength = 0;
    if (val.length >= 8) strength++;
    if (/[A-Z]/.test(val)) strength++;
    if (/[0-9]/.test(val)) strength++;
    if (/[^A-Za-z0-9]/.test(val)) strength++;

    const colors = ["#ef4444", "#f97316", "#eab308", "#22c55e"];
    const labels = ["Weak", "Fair", "Good", "Strong"];
    strengthBar.style.width = `${(strength / 4) * 100}%`;
    strengthBar.style.background = colors[strength - 1] || "#e5e7eb";
    strengthLabel.textContent = strength > 0 ? labels[strength - 1] : "At least 8 characters";
  });

  function showError(msg) {
    errorBox.textContent = msg;
    errorBox.style.display = "block";
    successBox.style.display = "none";
  }

  registerBtn.addEventListener("click", async () => {
    const username = document.getElementById("usernameInput").value.trim();
    const email = document.getElementById("emailInput").value.trim();
    const password = passwordInput.value;

    if (!username || !email || !password) return showError("Please fill in all fields.");
    if (username.length < 3) return showError("Username must be at least 3 characters.");
    if (password.length < 8) return showError("Password must be at least 8 characters.");

    registerBtn.disabled = true;
    registerBtn.textContent = "Creating account…";
    errorBox.style.display = "none";

    try {
      const res = await fetch("/api/auth/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, email, password })
      });

      const data = await res.json();

      if (!res.ok) return showError(data.error || "Registration failed");

      localStorage.setItem("viresce_token", data.token);
      localStorage.setItem("viresce_user", JSON.stringify(data.user));

      successBox.textContent = "Account created! Redirecting…";
      successBox.style.display = "block";

      setTimeout(() => window.location.href = "/index.html", 1000);

    } catch (err) {
      showError("Network error. Please try again.");
    } finally {
      registerBtn.disabled = false;
      registerBtn.textContent = "Create Account";
    }
  });

  document.addEventListener("keydown", e => {
    if (e.key === "Enter") registerBtn.click();
  });
</script>
</body>
</html>
