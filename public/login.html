<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Viresce | Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/style.css">
  <style>
    .auth-wrapper {
      min-height: calc(100vh - 140px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    .auth-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 40px;
      width: 100%;
      max-width: 420px;
    }
    .auth-card h2 {
      margin: 0 0 6px;
      font-size: 1.6rem;
    }
    .auth-card p.subtitle {
      color: var(--muted);
      margin: 0 0 28px;
      font-size: 0.95rem;
    }
    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg);
      font-size: 0.95rem;
      color: var(--text);
      transition: border 0.2s, box-shadow 0.2s;
      box-sizing: border-box;
    }
    .form-group input:focus {
      outline: none;
      border-color: #4F46E5;
      box-shadow: 0 0 0 3px rgba(79,70,229,0.12);
    }
    .auth-btn {
      width: 100%;
      padding: 13px;
      background: #0b0f19;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }
    .auth-btn:hover { opacity: 0.85; }
    .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .auth-error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.9rem;
      margin-bottom: 16px;
      display: none;
    }
    .auth-switch {
      text-align: center;
      margin-top: 22px;
      font-size: 0.9rem;
      color: var(--muted);
    }
    .auth-switch a {
      color: #4F46E5;
      font-weight: 600;
      text-decoration: none;
    }
    .auth-switch a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<header>
  <div class="container header-flex">
    <h1 class="logo">VIRESCE</h1>
    <span class="tagline">Stock Comparison Engine</span>
  </div>
</header>
<nav>
  <div class="container">
    <ul class="nav-links">
      <li><a href="/index.html">Dashboard</a></li>
      <li><a href="/compare.html">Compare</a></li>
      <li><a href="/fund.html">My Fund</a></li>
    </ul>
  </div>
</nav>

<div class="auth-wrapper">
  <div class="auth-card">
    <h2>Welcome back</h2>
    <p class="subtitle">Sign in to access your portfolios and watchlists.</p>

    <div class="auth-error" id="authError"></div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="emailInput" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="current-password" />
    </div>

    <button class="auth-btn" id="loginBtn">Sign In</button>

    <div class="auth-switch">
      Don't have an account? <a href="/register.html">Create one</a>
    </div>
  </div>
</div>

<footer>
  <p>&copy; 2026 Viresce FinTech</p>
</footer>

<script>
  // Redirect if already logged in
  if (localStorage.getItem("viresce_token")) {
    window.location.href = "/index.html";
  }

  const loginBtn = document.getElementById("loginBtn");
  const errorBox = document.getElementById("authError");

  function showError(msg) {
    errorBox.textContent = msg;
    errorBox.style.display = "block";
  }

  loginBtn.addEventListener("click", async () => {
    const email = document.getElementById("emailInput").value.trim();
    const password = document.getElementById("passwordInput").value;

    if (!email || !password) return showError("Please fill in all fields.");

    loginBtn.disabled = true;
    loginBtn.textContent = "Signing in…";
    errorBox.style.display = "none";

    try {
      const res = await fetch("/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (!res.ok) return showError(data.error || "Login failed");

      localStorage.setItem("viresce_token", data.token);
      localStorage.setItem("viresce_user", JSON.stringify(data.user));
      window.location.href = "/index.html";

    } catch (err) {
      showError("Network error. Please try again.");
    } finally {
      loginBtn.disabled = false;
      loginBtn.textContent = "Sign In";
    }
  });

  // Allow Enter key to submit
  document.addEventListener("keydown", e => {
    if (e.key === "Enter") loginBtn.click();
  });
</script>
</body>
</html>
